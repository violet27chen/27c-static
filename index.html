<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>27c.site - 网盘资源分享站</title>
  <meta name="description" content="27c.site 精选软件 · 免费分享 · 多网盘支持">
  <meta name="keywords" content="resource sharing,cloud drive,software,free download">
  <meta property="og:title" content="27c.site - 网盘资源分享站">
  <meta property="og:description" content="精选软件 · 免费分享 · 多网盘支持">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://27c.site">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/style.css?v=1">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">27c.site</a>
      <div class="nav-links">
        <a href="/" data-i18n="nav_home">软件</a>
        <span id="nav-user"></span>
        <a href="#" id="lang-toggle" class="lang-toggle">EN</a>
      </div>
      <button class="nav-toggle">&#9776;</button>
    </div>
  </nav>

  <div id="toast-container"></div>

  <main>
    <!-- Blog banner -->
    <div style="max-width:960px;margin:0 auto;padding:12px 16px 0">
      <a href="https://www.qiyuan.icu" target="_blank" style="display:block;background:#171717;border-radius:12px;padding:16px 24px;text-decoration:none;transition:transform .2s" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="flex:1;min-width:160px">
            <p style="color:#BDBDBD;font-size:11px;margin:0 0 4px;letter-spacing:1px">BLOG</p>
            <h2 id="blog-title" style="color:#fff;font-size:16px;font-weight:600;margin:0 0 4px;line-height:1.4">qi yuan · 个人博客</h2>
            <p id="blog-desc" style="color:#9E9E9E;font-size:13px;line-height:1.5;margin:0">技术教程 · 效率工具 · 软件推荐</p>
          </div>
          <div style="flex-shrink:0">
            <span id="blog-btn" style="display:inline-block;background:#fff;color:#171717;font-size:13px;font-weight:600;padding:8px 20px;border-radius:6px">去看看 →</span>
          </div>
        </div>
      </a>
    </div>

    <!-- Share notice -->
    <div style="max-width:960px;margin:0 auto;padding:0 16px">
      <div id="share-notice" style="background:#f7f7f7;border:1px solid #eee;border-radius:10px;padding:14px 20px;text-align:center;font-size:14px;color:#555;line-height:1.6">每个人都能成为资源分享者，只需注册登录即可发布商品，不需要任何费用</div>
    </div>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-banner"><span id="hero-b1">资源分享</span><span class="sep">|</span><span id="hero-b2">多网盘资源</span></div>
      <h1 id="hero-title">网盘资源分享站</h1>
      <p id="hero-desc">精选软件 · 免费分享 · 多网盘支持</p>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <form id="search-form">
        <input type="text" id="search-input" class="search" placeholder="搜索软件...">
      </form>
    </div>

    <!-- Categories -->
    <div id="categories" class="cats"></div>

    <!-- Product grid -->
    <div id="product-grid" class="grid"></div>
  </main>

  <footer>
    <p id="footer-text">© 2026 27c.site · 网盘资源分享站</p>
    <p class="footer-links">
      <a href="/">首页</a> ·
      <a href="/about.html">关于</a> ·
      <a href="/privacy.html">隐私政策</a> ·
      <a href="https://www.qiyuan.icu" target="_blank">博客</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 翻译动态元素
      const lang = currentLang();
      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.getElementById('blog-title').textContent = t('blog_title');
      document.getElementById('blog-desc').textContent = t('blog_desc');
      document.getElementById('blog-btn').textContent = t('blog_btn');
      document.getElementById('share-notice').textContent = t('share_notice');
      document.getElementById('hero-b1').textContent = t('hero_banner1');
      document.getElementById('hero-b2').textContent = t('hero_banner2');
      document.getElementById('hero-title').textContent = t('hero_title');
      document.getElementById('hero-desc').textContent = t('hero_desc');
      document.getElementById('search-input').placeholder = t('search_placeholder');
      document.getElementById('footer-text').textContent = t('footer_text');
      document.title = '27c.site - ' + t('hero_title');

      // URL 参数
      const params = new URLSearchParams(window.location.search);
      const searchQuery = params.get('q') || '';
      const catFilter = params.get('cat') || '';
      document.getElementById('search-input').value = searchQuery;

      // 搜索
      document.getElementById('search-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const q = document.getElementById('search-input').value.trim();
        const url = new URL(window.location);
        if (q) url.searchParams.set('q', q); else url.searchParams.delete('q');
        url.searchParams.delete('cat');
        window.location = url;
      });

      // 加载数据
      try {
        const [categories, products] = await Promise.all([
          fetchCategories(),
          fetchActiveProducts({ search: searchQuery, category: catFilter })
        ]);

        // 渲染分类
        const catsEl = document.getElementById('categories');
        const allBtn = document.createElement('button');
        allBtn.className = 'cat' + (!catFilter || catFilter === 'all' ? ' on' : '');
        allBtn.textContent = t('cat_all');
        allBtn.onclick = () => { const u = new URL(window.location); u.searchParams.delete('cat'); window.location = u; };
        catsEl.appendChild(allBtn);

        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'cat' + (catFilter === cat ? ' on' : '');
          btn.textContent = cat;
          btn.onclick = () => { const u = new URL(window.location); u.searchParams.set('cat', cat); window.location = u; };
          catsEl.appendChild(btn);
        });

        // 渲染商品
        const grid = document.getElementById('product-grid');
        if (products.length === 0) {
          grid.innerHTML = '<div class="no-results"><p>' + t('no_products') + '</p>' +
            (searchQuery ? '<p>' + t('try_other_search') + '</p>' : '') + '</div>';
          return;
        }

        products.forEach(p => {
          const img = (p.thumb_url || p.image_url)
            ? '<div class="card-img-wrap"><img class="card-img" src="' + (p.thumb_url || p.image_url) + '" alt="' + p.name + '" loading="lazy"></div>'
            : '<div class="card-img-wrap"><div class="card-img-placeholder"><span>' + p.name.slice(0,2) + '</span></div></div>';
          const cloud = p.cloud_type
            ? '<span class="cloud-badge cloud-' + p.cloud_type + '">' + t('cloud_' + p.cloud_type) + '</span>' : '';

          grid.innerHTML +=
            '<div class="card">' + img +
            '<div class="card-body">' +
            '<h3 class="card-title">' + p.name + '</h3>' +
            cloud +
            (p.description ? '<p class="card-desc">' + p.description + '</p>' : '') +
            '<div class="card-footer">' +
            '<span class="price price-free">' + t('price_free') + '</span>' +
            '<a href="/product.html?id=' + p.id + '" class="btn btn-primary btn-sm">' + t('view_detail') + '</a>' +
            '</div></div></div>';
        });
      } catch (err) {
        console.error('Failed to load:', err);
        document.getElementById('product-grid').innerHTML =
          '<div class="no-results"><p>加载失败，请检查 Supabase 配置</p></div>';
      }
    });
  </script>
</body>
</html>
