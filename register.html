<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 27c.site</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/style.css?v=1">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">27c.site</a>
      <div class="nav-links">
        <a href="/" data-i18n="nav_home">软件</a>
        <span id="nav-user"></span>
        <a href="#" id="lang-toggle" class="lang-toggle">EN</a>
      </div>
      <button class="nav-toggle">&#9776;</button>
    </div>
  </nav>

  <div id="toast-container"></div>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <h1 id="auth-title">注册</h1>
        <p class="auth-sub" id="auth-sub">创建 27c.site 账号</p>

        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label id="label-user">用户名</label>
            <input type="text" id="reg-username" required placeholder="3-50个字符" minlength="3" maxlength="50" autocomplete="username">
          </div>
          <div class="form-group">
            <label id="label-email">邮箱</label>
            <input type="email" id="reg-email" required placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label id="label-pw">密码</label>
            <input type="password" id="reg-password" required placeholder="至少6个字符" minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label id="label-confirm">确认密码</label>
            <input type="password" id="reg-confirm" required placeholder="再次输入密码" autocomplete="new-password">
          </div>
          <button type="submit" id="btn-submit" class="btn btn-primary btn-full">注册</button>
        </form>

        <p class="auth-switch" id="auth-switch">已有账号？ <a href="/login.html">立即登录</a></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('auth-title').textContent = t('register_title');
      document.getElementById('auth-sub').textContent = t('register_sub');
      document.getElementById('label-user').textContent = t('label_username');
      document.getElementById('reg-username').placeholder = t('placeholder_username_len');
      document.getElementById('label-email').textContent = t('label_email');
      document.getElementById('reg-email').placeholder = t('placeholder_email');
      document.getElementById('label-pw').textContent = t('label_password');
      document.getElementById('reg-password').placeholder = t('placeholder_min6');
      document.getElementById('label-confirm').textContent = t('label_confirm_pw');
      document.getElementById('reg-confirm').placeholder = t('placeholder_confirm_pw');
      document.getElementById('btn-submit').textContent = t('btn_register');
      document.getElementById('auth-switch').innerHTML = t('has_account') + ' <a href="/login.html">' + t('login_now') + '</a>';
      document.title = t('register_title') + ' - 27c.site';

      if (isLoggedIn()) { window.location = '/'; return; }

      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (password !== confirm) { showToast('两次输入的密码不一致', 'error'); return; }
        if (username.length < 3) { showToast('用户名至少3个字符', 'error'); return; }

        try {
          // 先注册邮箱+密码
          await signUp(email, password, username);

          // 创建 profiles 记录存 username
          const { data: { user } } = await supabase.auth.getUser();
          if (user) {
            await supabase.from('profiles').upsert({
              id: user.id,
              username: username,
              email: email,
            });
          }

          showToast('注册成功', 'success');
          setTimeout(() => window.location = '/', 500);
        } catch (err) {
          showToast(err.message || '注册失败', 'error');
        }
      });
    });
  </script>
</body>
</html>
