<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 27c.site</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/style.css?v=1">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">27c.site</a>
      <div class="nav-links">
        <a href="/" data-i18n="nav_home">软件</a>
        <span id="nav-user"></span>
        <a href="#" id="lang-toggle" class="lang-toggle">EN</a>
      </div>
      <button class="nav-toggle">&#9776;</button>
    </div>
  </nav>

  <div id="toast-container"></div>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <h1 id="auth-title">登录</h1>
        <p class="auth-sub" id="auth-sub">欢迎回到 27c.site</p>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label id="label-user">用户名或邮箱</label>
            <input type="text" id="identifier" required placeholder="请输入用户名或邮箱" autocomplete="username">
          </div>
          <div class="form-group">
            <label id="label-pw">密码</label>
            <input type="password" id="password" required placeholder="请输入密码" autocomplete="current-password">
          </div>
          <button type="submit" id="btn-submit" class="btn btn-primary btn-full">登录</button>
        </form>

        <p class="auth-switch" id="auth-switch">还没有账号？ <a href="/register.html">立即注册</a></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('auth-title').textContent = t('login_title');
      document.getElementById('auth-sub').textContent = t('login_sub');
      document.getElementById('label-user').textContent = t('label_username');
      document.getElementById('identifier').placeholder = t('placeholder_username');
      document.getElementById('label-pw').textContent = t('label_password');
      document.getElementById('password').placeholder = t('placeholder_password');
      document.getElementById('btn-submit').textContent = t('btn_login');
      document.getElementById('auth-switch').innerHTML = t('no_account') + ' <a href="/register.html">' + t('register_now') + '</a>';
      document.title = t('login_title') + ' - 27c.site';

      // 已登录则跳转
      if (isLoggedIn()) { window.location = '/'; return; }

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('identifier').value.trim();
        const pw = document.getElementById('password').value;
        try {
          await signIn(id, pw);
          showToast(t('btn_login') + '...', 'success');
          const next = new URLSearchParams(window.location.search).get('next') || '/';
          setTimeout(() => window.location = next, 300);
        } catch (err) {
          showToast(err.message || '登录失败', 'error');
        }
      });
    });
  </script>
</body>
</html>
